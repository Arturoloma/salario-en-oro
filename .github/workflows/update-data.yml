name: Update Economic Data

on:
  schedule:
    - cron: '0 0 1 * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Update economic data
        run: pnpm data:update

      - name: Validate data
        run: pnpm data:validate

      - name: Run tests with coverage
        run: pnpm coverage

      - name: Check Astro and TypeScript
        run: pnpm check

      - name: Lint
        run: pnpm lint

      - name: Check formatting
        run: pnpm format:check

      - name: Build
        run: pnpm build

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'Update annual economic data'
          title: 'Update annual economic data'
          body: |
            This PR was automatically generated by the data update workflow.

            It updates the following datasets:
            - Spanish CPI (INE)
            - Gold prices (World Bank Commodity Markets)
            - EUR/USD exchange rates (ECB)
            - ESP/USD exchange rates (Banco de España)

            Please review the changes and merge if everything looks correct.
          branch: update-economic-data
          delete-branch: true
          labels: |
            automated
            data-update
